name: Deploy Stephanos to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stephanos-ui/package-lock.json

      - name: Install UI dependencies
        working-directory: stephanos-ui
        run: npm ci

      - name: Build Stephanos UI dist
        run: npm run stephanos:build

      - name: Verify Stephanos dist
        run: npm run stephanos:verify

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact structure
        run: |
          rm -rf _site
          mkdir -p _site

          rsync -a ./ ./_site \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'node_modules/' \
            --exclude 'stephanos-ui/node_modules/' \
            --exclude 'stephanos-server/node_modules/' \
            --exclude '.DS_Store'

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
