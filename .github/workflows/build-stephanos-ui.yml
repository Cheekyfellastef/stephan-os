name: Build and Deploy Stephanos UI

on:
  push:
    branches:
      - main
    paths:
      - 'stephanos-ui/**'
      - 'apps/stephanos/app.json'
      - '.github/workflows/build-stephanos-ui.yml'
  pull_request:
    paths:
      - 'stephanos-ui/**'
      - 'apps/stephanos/app.json'
      - '.github/workflows/build-stephanos-ui.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: stephanos-ui-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: stephanos-ui
        run: npm ci

      - name: Build Stephanos UI into apps/stephanos/dist
        working-directory: stephanos-ui
        run: npm run build

      - name: Upload built Stephanos dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: stephanos-ui-dist
          path: apps/stephanos/dist

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/stephanos/dist

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
