name: Build Stephanos UI

on:
  push:
    paths:
      - 'stephanos-ui/**'
      - 'apps/stephanos/app.json'
  pull_request:
    paths:
      - 'stephanos-ui/**'
      - 'apps/stephanos/app.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: stephanos-ui
        run: npm install

      - name: Build Stephanos UI into apps/stephanos/dist
        working-directory: stephanos-ui
        run: npm run build

      - name: Upload built Stephanos dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: stephanos-ui-dist
          path: apps/stephanos/dist
