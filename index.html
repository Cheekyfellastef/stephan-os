<!DOCTYPE html>
<html lang="en">

<head>


<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stephan OS</title>

<link rel="stylesheet" href="styles.css">
    
    <!-- Stephanos App Icon -->
<link rel="apple-touch-icon" href="stephanos-icon.png">
<link rel="icon" href="stephanos-icon.png">

<!-- Enable iOS Web App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stephanos OS">

<style>

#project-registry{

    display:grid;

    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));

    gap:20px;

}

.app-tile {

    background:#222;
    color:white;

    padding:20px;
    margin:15px 0;

    font-size:22px;
    text-align:center;

    border-radius:10px;

    cursor:pointer;

    transition:all 0.2s ease;

}

.app-tile:hover {

    background:#444;
    transform:scale(1.02);

}

body{
    font-family: Arial, Helvetica, sans-serif;
    padding:20px;
}



#dev-console{
    margin-top:20px;
    padding:10px;
    background:#111;
    color:#0f0;
    font-family:monospace;
}

button{
    margin-top:10px;
}

</style>

</head>


<body>
    <div id="boot-screen">

<h1>Stephanos OS</h1>

<p id="boot-status">Initializing systems...</p>

</div>
    

<h1>Stephan OS</h1>


<section>

<h2>System Status</h2>
<p id="system-status-text">System Initialising...</p>

</section>


<section id="projects">

<h2>Projects</h2>

<div id="project-registry"></div>

</section>


<section id="workspace" style="display:none; margin-top:20px;">

<h2 id="workspace-title"></h2>

<div id="workspace-content"></div>

<button onclick="returnToCommandDeck()">Return to Command Deck</button>

</section>


<section>

<h3>Developer Console</h3>

<div id="dev-console"></div>

</section>


<script src="main.js"></script>


</body>

</html>
