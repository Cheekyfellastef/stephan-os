<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stephanos OS</title>

<meta name="stephanos-version" content="0.1">

<link rel="stylesheet" href="style.css">

<!-- Stephanos App Icon -->
<link rel="apple-touch-icon" href="stephanos-icon.png">
<link rel="icon" href="stephanos-icon.png">

<!-- Enable iOS Web App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stephanos OS">

<style>

#project-registry{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
}

.app-tile {

background:#222;
color:white;

padding:20px;
margin:15px 0;

font-size:22px;
text-align:center;

border-radius:10px;

cursor:pointer;

transition:all 0.2s ease;

}

.app-tile:hover {

background:#444;
transform:scale(1.02);

}

body{
font-family: Arial, Helvetica, sans-serif;
padding:20px;
}

#system-controls {
position: fixed;
top: 16px;
right: 16px;
display: flex;
gap: 8px;
z-index: 21000;
}

#system-controls button {
width: 40px;
height: 40px;
margin-top: 0;
border: none;
border-radius: 8px;
background: rgba(20, 20, 20, 0.9);
color: #fff;
font-size: 18px;
cursor: pointer;
}

#system-controls button:hover {
background: rgba(70, 70, 70, 0.95);
}

#dev-console{
display:none;
margin-top:20px;
padding:10px;
background:#111;
color:#0f0;
font-family:monospace;
}

#developer-console-title{
display:none;
}

button{
margin-top:10px;
}

#boot-screen {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

color:#0f0;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

font-family:monospace;

z-index:9999;

}

#boot-screen h1{

font-size:32px;
margin-bottom:20px;

}

</style>

</head>

<body>

<div id="system-controls" aria-label="System controls">
<button onclick="openSystemPanel()" title="Open System Panel" aria-label="Open System Panel">⚙</button>
<button onclick="reloadStephanos()" title="Reload Stephanos OS" aria-label="Reload Stephanos OS">⟳</button>
<button onclick="exitStephanos()" title="Exit fullscreen web app" aria-label="Exit fullscreen web app">⏻</button>
</div>

<div id="boot-screen">

<h1 id="boot-title">Stephanos OS</h1>

<p id="boot-status">Initializing systems...</p>

</div>

<h1>Stephanos OS</h1>

<section>

<h2>System Status</h2>
<p id="system-status-text">System Initialising...</p>

</section>

<section id="projects">

<h2>Projects</h2>

<div id="project-registry"></div>

</section>

<section id="workspace" style="display:none; margin-top:20px;">

<h2 id="workspace-title"></h2>

<div id="workspace-content"></div>

<button onclick="returnToCommandDeck()">Return to Command Deck</button>

</section>

<section>

<h3 id="developer-console-title">Developer Console</h3>

<div id="dev-console"></div>

</section>

<script type="module" src="main.js?v=0.1"></script>

</body>

</html>
