<!DOCTYPE html>
<html lang="en">

<head>

<!-- LAUNCHER ONLY: do not put Mission Console/provider/theme logic here. Live Stephanos UI source lives in stephanos-ui/src/** and builds into apps/stephanos/dist/**. -->

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stephanos OS</title>

<meta name="stephanos-version" content="0.1">

<meta name="mobile-web-app-capable" content="yes"> 
  
<link rel="stylesheet" href="style.css">

<!-- Stephanos App Icon -->
<link rel="apple-touch-icon" href="stephanos-icon.png">
<link rel="icon" href="stephanos-icon.png">

<!-- Enable iOS Web App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stephanos OS">

<style>

#project-registry{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
}

.app-tile {

background:#222;
color:white;

padding:20px;
margin:15px 0;

font-size:22px;
text-align:center;

border-radius:10px;

cursor:pointer;

transition:all 0.2s ease;

}

.app-tile:hover {

background:#444;
transform:scale(1.02);

}


.app-tile-error {
background:#3a1f1f;
border:1px solid #a94444;
cursor:not-allowed;
opacity:0.9;
}

.app-tile-error:hover {
background:#4a2525;
transform:none;
}

.app-tile-pending {
background:#2d2813;
border:1px solid #d8b44c;
cursor:wait;
opacity:0.96;
}

.app-tile-pending:hover {
background:#3a3318;
transform:none;
}

.app-tile-degraded {
background:linear-gradient(180deg, #13243a, #0d1828);
border:1px solid #3c78b8;
}

.app-tile-degraded:hover {
background:linear-gradient(180deg, #17304f, #11203a);
}

.app-tile-detail {
margin-top:10px;
font-size:13px;
color:#9fd4ff;
line-height:1.3;
}

.launcher-runtime-strip,
.mobile-companion-deck {
margin: 0 0 18px;
}

.runtime-strip-card,
.companion-deck-card {
padding: 14px 16px;
border-radius: 12px;
border: 1px solid #2d69a3;
background: linear-gradient(180deg, rgba(8, 19, 37, 0.96), rgba(4, 12, 22, 0.98));
box-shadow: 0 14px 36px rgba(0, 0, 0, 0.25);
}

.runtime-strip-card.ready,
.companion-deck-card.ready {
border-color: #2d8b6f;
}

.runtime-strip-card.degraded,
.companion-deck-card.degraded {
border-color: #3c78b8;
}

.runtime-strip-card.unavailable,
.companion-deck-card.unavailable {
border-color: #9b4040;
}

.runtime-strip-label {
font-size: 12px;
text-transform: uppercase;
letter-spacing: 0.08em;
color: #8fcfff;
margin-bottom: 6px;
}

.runtime-strip-subtext,
.companion-deck-card p {
margin: 6px 0 0;
color: #c6e6ff;
}

.runtime-chip-row {
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:12px;
}

.runtime-chip {
display:inline-flex;
align-items:center;
padding:6px 10px;
border-radius:999px;
font-size:12px;
border:1px solid rgba(114, 196, 255, 0.3);
background: rgba(10, 29, 48, 0.78);
color: #dff4ff;
}

.runtime-chip.ready {
border-color:#2d8b6f;
}

.runtime-chip.degraded {
border-color:#3c78b8;
}

.runtime-chip.neutral {
border-color:#497ec2;
}

.companion-launch-button {
margin-top: 12px;
width: 100%;
padding: 12px 16px;
border: 1px solid #6ac3ff;
border-radius: 10px;
background: linear-gradient(180deg, #1b6bd1, #134f9e);
color: #eef9ff;
font-weight: 700;
}

@media (min-width: 821px) {
  .mobile-companion-deck {
    display: none;
  }
}

@media (max-width: 820px) {
  #project-registry {
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .app-tile {
    margin: 0;
    text-align: left;
  }
}

.app-tile-issue {
margin-top:10px;
font-size:13px;
color:#ffdf9e;
line-height:1.3;
}

body{
font-family: Arial, Helvetica, sans-serif;
padding:20px;
}

#system-controls {
position: fixed;
top: 16px;
right: 16px;
display: flex;
gap: 8px;
z-index: 21000;
}

#system-controls button {
width: 40px;
height: 40px;
margin-top: 0;
border: none;
border-radius: 8px;
background: rgba(20, 20, 20, 0.9);
color: #fff;
font-size: 18px;
cursor: pointer;
}

#system-controls button:hover {
background: rgba(70, 70, 70, 0.95);
}

#dev-console{
display:none;
margin-top:20px;
padding:10px;
background:#111;
color:#0f0;
font-family:monospace;
}

#developer-console-title{
display:none;
}

button{
margin-top:10px;
}

#boot-screen {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

color:#0f0;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

font-family:monospace;

z-index:9999;

}

#boot-screen h1{

font-size:32px;
margin-bottom:20px;

}

</style>

</head>

<body>
<!-- Launcher shell only: the live Stephanos Mission Console UI is built from stephanos-ui/src into apps/stephanos/dist and opened from this root shell. -->

<div id="system-controls" aria-label="System controls">
<button onclick="openSystemPanel()" title="Open System Panel" aria-label="Open System Panel">⚙</button>
<button onclick="reloadStephanos()" title="Reload Stephanos OS" aria-label="Reload Stephanos OS">⟳</button>
<button onclick="exitStephanos()" title="Exit fullscreen web app" aria-label="Exit fullscreen web app">⏻</button>
</div>

<div id="boot-screen">

<h1 id="boot-title">Stephanos OS</h1>

<p id="boot-status">Initializing systems...</p>

</div>

<h1>Stephanos OS</h1>

<section>

<h2>System Status</h2>
<p id="system-status-text">System Initialising...</p>

</section>

<section id="projects">

<h2>Projects</h2>

<section id="launcher-runtime-strip" class="launcher-runtime-strip"></section>
<section id="mobile-companion-deck" class="mobile-companion-deck"></section>
<div id="project-registry"></div>

</section>

<section id="workspace" style="display:none; margin-top:20px;">

<h2 id="workspace-title"></h2>

<div id="workspace-content"></div>

<button onclick="returnToCommandDeck()">Return to Command Deck</button>

</section>

<div id="stephanos-layout">
  <div id="left-column"></div>
  <div id="right-column"></div>
</div>

<section>

<h3 id="developer-console-title">Developer Console</h3>

<div id="dev-console"></div>

</section>

<script type="module" src="main.js?v=0.1"></script>

</body>

</html>
