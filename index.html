<script>
(function stephanosEarlyBootstrapDiagnostics() {
  const diagnosticsMeta = document.querySelector('meta[name="stephanos-launcher-diagnostics"]');
  const diagnosticsEnabled = /^(1|true|on|yes|enabled)$/i.test(String(diagnosticsMeta?.getAttribute("content") || "").trim());
  if (!diagnosticsEnabled) {
    return;
  }

  const DIAG_PREFIX = '[Stephanos Early Bootstrap]';
  const startedAt = Date.now();
  const safeLog = (...args) => {
    try { console.info(DIAG_PREFIX, ...args); } catch {}
  };

  safeLog('root HTML parser reached diagnostics block', {
    href: globalThis.location?.href || '',
    topEqualsSelf: globalThis.top === globalThis.self,
    readyState: document.readyState,
    startedAt,
  });

  const describeUrlArg = (value) => {
    if (typeof value === 'string') return value;
    if (value && typeof value.href === 'string') return value.href;
    return String(value ?? '');
  };

  const wrapLocationFn = (name) => {
    const original = globalThis.location?.[name];
    if (typeof original !== 'function') return;
    globalThis.location[name] = function patchedLocationNavigation(...args) {
      safeLog(`location.${name} called`, { target: describeUrlArg(args[0] ?? '') });
      return original.apply(this, args);
    };
  };

  wrapLocationFn('assign');
  wrapLocationFn('replace');

  const originalWindowOpen = globalThis.open;
  if (typeof originalWindowOpen === 'function') {
    globalThis.open = function patchedWindowOpen(...args) {
      safeLog('window.open called', { target: describeUrlArg(args[0] ?? ''), rawArgs: args });
      return originalWindowOpen.apply(this, args);
    };
  }

  const originalCreateElement = Document.prototype.createElement;
  Document.prototype.createElement = function patchedCreateElement(...args) {
    const element = originalCreateElement.apply(this, args);
    const tag = String(args[0] || '').toLowerCase();
    if (tag === 'iframe' || tag === 'frame') {
      safeLog('frame element created', { tag, stack: new Error().stack });
    }
    return element;
  };

  const originalSetAttribute = Element.prototype.setAttribute;
  Element.prototype.setAttribute = function patchedSetAttribute(name, value) {
    const tagName = String(this?.tagName || '').toLowerCase();
    const attrName = String(name || '').toLowerCase();
    if ((tagName === 'iframe' || tagName === 'frame') && attrName === 'src') {
      safeLog('frame src attribute assigned', { tagName, value: String(value || '') });
    }
    return originalSetAttribute.call(this, name, value);
  };

  window.addEventListener('beforeunload', () => {
    safeLog('beforeunload fired', {
      href: globalThis.location?.href || '',
      elapsedMs: Date.now() - startedAt,
    });
  });
})();
</script>

<style>

#project-registry{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
}

.app-tile {

background:#222;
color:white;

padding:20px;
margin:15px 0;

font-size:22px;
text-align:center;

border-radius:10px;

cursor:pointer;

transition:all 0.2s ease;

}

.app-tile:hover {

background:#444;
transform:scale(1.02);

}


.app-tile-error {
background:#3a1f1f;
border:1px solid #a94444;
cursor:not-allowed;
opacity:0.9;
}

.app-tile-error:hover {
background:#4a2525;
transform:none;
}

.app-tile-error.app-tile-error-launchable {
cursor:pointer;
}

.app-tile-error.app-tile-error-launchable:hover {
background:#4a2525;
transform:scale(1.02);
}

.app-tile-pending {
background:#2d2813;
border:1px solid #d8b44c;
cursor:wait;
opacity:0.96;
}

.app-tile-pending:hover {
background:#3a3318;
transform:none;
}

.app-tile-pending.app-tile-pending-launchable {
cursor:pointer;
}

.app-tile-pending.app-tile-pending-launchable:hover {
background:#4a421f;
transform:scale(1.02);
}

.app-tile-degraded {
background:linear-gradient(180deg, #13243a, #0d1828);
border:1px solid #3c78b8;
}

.app-tile-degraded:hover {
background:linear-gradient(180deg, #17304f, #11203a);
}

.app-tile-detail {
margin-top:10px;
font-size:13px;
color:#9fd4ff;
line-height:1.3;
}

.launcher-runtime-strip,
.mobile-companion-deck {
margin: 0 0 18px;
}

#launcher-secondary-panels {
margin-top: 16px;
display: flex;
flex-direction: column;
gap: 12px;
}

#launcher-runtime-strip {
order: 1;
}

#mobile-companion-deck {
order: 2;
}

#launcher-diagnostics-panel {
order: 3;
}

.runtime-strip-card,
.companion-deck-card {
padding: 14px 16px;
border-radius: 12px;
border: 1px solid #2d69a3;
background: linear-gradient(180deg, rgba(8, 19, 37, 0.96), rgba(4, 12, 22, 0.98));
box-shadow: 0 14px 36px rgba(0, 0, 0, 0.25);
}

.runtime-strip-card.ready,
.companion-deck-card.ready {
border-color: #2d8b6f;
}

.runtime-strip-card.degraded,
.companion-deck-card.degraded {
border-color: #3c78b8;
}

.runtime-strip-card.unavailable,
.companion-deck-card.unavailable {
border-color: #9b4040;
}

.runtime-strip-label {
font-size: 12px;
text-transform: uppercase;
letter-spacing: 0.08em;
color: #8fcfff;
margin-bottom: 6px;
}

.runtime-strip-subtext,
.companion-deck-card p {
margin: 6px 0 0;
color: #c6e6ff;
}

.ignition-mode-banner {
margin: 10px 0 18px;
padding: 12px 14px;
border-radius: 10px;
border: 2px solid #2d8b6f;
background: linear-gradient(180deg, rgba(9, 33, 26, 0.96), rgba(6, 20, 16, 0.98));
color: #d9fff1;
font-weight: 700;
letter-spacing: 0.02em;
}

.ignition-mode-banner code {
color: #9af7d1;
}

.runtime-chip-row {
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:12px;
}

.runtime-chip {
display:inline-flex;
align-items:center;
padding:6px 10px;
border-radius:999px;
font-size:12px;
border:1px solid rgba(114, 196, 255, 0.3);
background: rgba(10, 29, 48, 0.78);
color: #dff4ff;
}

.runtime-chip.ready {
border-color:#2d8b6f;
}

.runtime-chip.degraded {
border-color:#3c78b8;
}

.runtime-chip.neutral {
border-color:#497ec2;
}

.runtime-fingerprint-badge {
position: static;
margin-top: 10px;
max-width: 100%;
font-size: 12px;
line-height: 1.35;
padding: 10px 12px;
border-radius: 10px;
border: 1px solid #356ea8;
background: rgba(5, 14, 28, 0.94);
box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
color: #d0ebff;
}

.runtime-fingerprint-badge strong {
display: block;
margin-bottom: 6px;
font-size: 11px;
letter-spacing: 0.05em;
text-transform: uppercase;
color: #9fd4ff;
}

.runtime-fingerprint-badge ul {
margin: 0;
padding-left: 16px;
}

.runtime-fingerprint-badge code {
word-break: break-all;
color: #fff;
}

.runtime-fingerprint-summary {
margin: 0;
font-size: 12px;
color: #d0ebff;
}

.runtime-fingerprint-badge details {
margin-top: 8px;
}

.runtime-fingerprint-badge summary {
cursor: pointer;
font-size: 11px;
color: #a8dbff;
}

.runtime-diagnostics-card {
margin-top: 14px;
padding: 12px 14px;
border: 1px solid #355d8b;
border-radius: 10px;
background: rgba(6, 16, 30, 0.86);
}

.runtime-diagnostics-card.secondary {
margin-top: 18px;
padding: 10px 12px;
background: rgba(5, 13, 25, 0.74);
}

.runtime-diagnostics-card summary {
cursor: pointer;
font-weight: 700;
color: #a8dbff;
}

.runtime-diagnostics-card summary span {
display: block;
margin-top: 6px;
font-weight: 400;
font-size: 12px;
color: #d2ecff;
}

.runtime-diagnostics-card pre {
white-space: pre-wrap;
background: #0b1320;
color: #bfe4ff;
padding: 10px;
border-radius: 8px;
overflow: auto;
margin: 10px 0 0;
max-height: 320px;
}

.runtime-diagnostics-compact {
margin: 10px 0 12px;
font-size: 13px;
color: #9fd4ff;
}

.companion-launch-button {
margin-top: 12px;
width: 100%;
padding: 12px 16px;
border: 1px solid #6ac3ff;
border-radius: 10px;
background: linear-gradient(180deg, #1b6bd1, #134f9e);
color: #eef9ff;
font-weight: 700;
}

@media (min-width: 821px) {
  .mobile-companion-deck {
    display: none;
  }
}

@media (max-width: 820px) {
  #project-registry {
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .app-tile {
    margin: 0;
    text-align: left;
  }
}

.app-tile-issue {
margin-top:10px;
font-size:13px;
color:#ffdf9e;
line-height:1.3;
}

#stephanos-laws-mount {
margin-top: 0;
}

.stephanos-laws-panel {
border: 1px solid #234260;
background: linear-gradient(180deg, #0a1320, #091729);
color: #d6eeff;
padding: 16px;
border-radius: 12px;
}

.stephanos-laws-panel h2 {
margin: 0 0 8px;
font-size: 20px;
}

.stephanos-laws-intro {
margin: 0 0 12px;
font-size: 13px;
color: #9fc8e4;
}

.stephanos-law-category {
margin-top: 10px;
}

.stephanos-law-category h3 {
font-size: 14px;
text-transform: uppercase;
letter-spacing: 0.04em;
margin: 14px 0 8px;
color: #7ebaf0;
}

.stephanos-law-card {
border: 1px solid #1e3752;
background: #08111d;
border-radius: 10px;
padding: 10px 12px;
margin-bottom: 8px;
}

.stephanos-law-card summary {
display: flex;
justify-content: space-between;
gap: 10px;
cursor: pointer;
font-weight: 600;
}

.stephanos-law-meta {
font-size: 12px;
color: #9fc8e4;
text-transform: uppercase;
}

.stephanos-law-short {
font-size: 13px;
color: #c5e6ff;
margin: 8px 0;
}

.stephanos-system-panel {
position: fixed;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: #101824;
border: 1px solid #2d4762;
border-radius: 12px;
padding: 16px;
width: min(380px, calc(100vw - 40px));
z-index: 5000;
color: #dff4ff;
box-shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
}

.stephanos-system-panel-header {
display: flex;
align-items: center;
gap: 10px;
cursor: grab;
user-select: none;
}

.stephanos-system-panel h3 {
margin: 0;
font-size: 19px;
}

.stephanos-system-panel .system-panel-subtitle {
margin: 6px 0 10px;
font-size: 12px;
color: #96c6eb;
}

.stephanos-system-panel h4 {
margin: 10px 0 8px;
font-size: 12px;
text-transform: uppercase;
letter-spacing: 0.05em;
color: #8fcfff;
}

.stephanos-system-toggle {
display: flex;
align-items: center;
justify-content: space-between;
gap: 12px;
margin-bottom: 8px;
font-size: 14px;
}

.stephanos-system-panel hr {
border: 0;
height: 1px;
background: #243f59;
margin: 12px 0;
}

.system-panel-close {
width: 100%;
margin-top: 0;
padding: 10px 12px;
border-radius: 8px;
border: 1px solid #355d8b;
background: rgba(9, 22, 37, 0.96);
color: #dff4ff;
cursor: pointer;
}

.system-panel-action {
width: 100%;
margin-bottom: 8px;
padding: 8px 10px;
border-radius: 8px;
border: 1px solid #355d8b;
background: rgba(8, 21, 35, 0.88);
color: #dff4ff;
cursor: pointer;
}

.system-panel-sync-status {
margin: 4px 0 0;
font-size: 12px;
color: #9dd2f7;
}

.truth-panel {
margin-top: 12px;
}

.truth-panel-header {
display: flex;
justify-content: space-between;
gap: 10px;
align-items: center;
}

.truth-panel-header h3 {
margin: 0;
font-size: 14px;
color: #a8dbff;
}

.truth-panel-pill {
font-size: 11px;
padding: 3px 8px;
border-radius: 999px;
border: 1px solid #356ea8;
text-transform: uppercase;
}

.truth-status-healthy .truth-panel-pill {
border-color: #2d8b6f;
color: #a6efd4;
}

.truth-status-degraded .truth-panel-pill,
.truth-status-critical .truth-panel-pill {
border-color: #b4793c;
color: #ffd9a8;
}

.truth-panel-intro {
font-size: 12px;
color: #9fd4ff;
margin: 8px 0 10px;
}

.truth-panel-grid details {
margin-top: 6px;
}

.truth-panel-signal-list {
list-style: none;
padding: 0;
margin: 8px 0;
}

.truth-panel-signal-list li {
display: flex;
justify-content: space-between;
gap: 12px;
font-size: 12px;
margin-bottom: 4px;
}

.truth-panel-signal-list b {
font-weight: 600;
color: #dff4ff;
}

.truth-contradictions ul {
padding-left: 16px;
font-size: 12px;
}

@media (max-width: 820px) {
  .stephanos-law-card summary {
    flex-direction: column;
  }
}

body{
font-family: Arial, Helvetica, sans-serif;
padding:20px;
}

#system-controls {
position: fixed;
top: 16px;
right: 16px;
display: flex;
gap: 8px;
z-index: 21000;
}

#launcher-build-proof {
max-width: 100%;
padding: 2px 0 0;
color: #dff4ff;
font-size: 11px;
line-height: 1.25;
}

#launcher-build-proof strong {
display: block;
font-size: 11px;
margin-bottom: 2px;
}

#launcher-build-proof code {
color: #9fd4ff;
}

#system-controls button {
width: 40px;
height: 40px;
margin-top: 0;
border: none;
border-radius: 8px;
background: rgba(20, 20, 20, 0.9);
color: #fff;
font-size: 18px;
cursor: pointer;
}

#system-controls button:hover {
background: rgba(70, 70, 70, 0.95);
}

#dev-console{
display:none;
margin-top:20px;
padding:10px;

}

#developer-console-title{

}

button{
margin-top:10px;
}

#boot-screen {

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:#000;

color:#0f0;

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

font-family:monospace;

z-index:9999;

}

#boot-screen h1{

font-size:32px;
margin-bottom:20px;

}

</style>

<button onclick="openSystemPanel()" title="Open System Panel" aria-label="Open System Panel">⚙</button>
<button onclick="reloadStephanos()" title="Reload Stephanos OS" aria-label="Reload Stephanos OS">⟳</button>
<button onclick="exitStephanos()" title="Exit fullscreen web app" aria-label="Exit fullscreen web app">⏻</button>
</div>

<aside id="launcher-build-proof" aria-live="polite">
  <strong>Build</strong>
  <div>loading current runtime marker…</div>
</aside>

<div id="boot-screen">

<h1 id="boot-title">Stephanos OS</h1>

<p id="boot-status">Initializing systems...</p>

</div>

<h1>Stephanos OS</h1>

<section id="projects">

<h2>Projects</h2>
<div id="project-registry"></div>
</section>
<section id="stephanos-laws-mount" aria-label="Laws of Stephanos"></section>

  <div id="left-column"></div>
  <div id="right-column"></div>
</div>
