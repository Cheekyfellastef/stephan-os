<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experimental · Stephanos</title>
    <style>
      :root {
        --bg: #0a1020;
        --bg-panel: #101933;
        --fg: #d5e5ff;
        --muted: #88a0c7;
        --blue: #3b82f6;
        --blue-soft: rgba(59, 130, 246, 0.24);
        --warn: #f59e0b;
        --ok: #22c55e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #10234a 0%, var(--bg) 50%);
        color: var(--fg);
      }
      .app-shell {
        min-height: 100vh;
        padding: 16px;
        display: grid;
        gap: 12px;
      }
      .panel {
        background: var(--bg-panel);
        border: 1px solid var(--blue-soft);
        border-radius: 12px;
        padding: 12px;
      }
      h1, h2, h3, h4 { margin: 0 0 8px; }
      .muted { color: var(--muted); }
      .control-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }
      textarea, input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #2a4477;
        background: #0f1b36;
        color: var(--fg);
      }
      button {
        background: var(--blue);
        color: white;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        cursor: pointer;
      }
      .secondary { background: #1e3a6b; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      pre {
        margin: 0;
        padding: 10px;
        background: #0b152b;
        border-radius: 8px;
        max-height: 240px;
        overflow: auto;
      }
      .badge { padding: 4px 8px; border-radius: 999px; border: 1px solid #385589; font-size: 12px; }
      .badge-good { border-color: rgba(34, 197, 94, 0.5); color: #86efac; }
      .badge-warn { border-color: rgba(245, 158, 11, 0.5); color: #fcd34d; }
      .metrics-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
      .panel-grid { display: grid; gap: 8px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
      @media (min-width: 900px) {
        .app-shell { padding: 20px; }
      }
    </style>
  </head>
  <body>
    <script type="module" src="../../../shared/runtime/commandDeckReturnControls.mjs"></script>
    <main id="app" class="app-shell" data-build="vite-like-static-output">
      <section class="panel">
        <h1>Experimental System Simulator</h1>
        <p class="muted">Intent → Decomposition → Generation → Simulation → Evaluation → Iteration</p>
      </section>

      <section class="panel control-grid">
        <h2>Intent Input</h2>
        <textarea id="intent-input" rows="5" placeholder="Describe a high-level system intent..."></textarea>
        <div class="actions">
          <button id="run-btn">Run Experimental Cycle</button>
          <button id="rerun-btn" class="secondary">Re-run with Refinements</button>
          <span id="run-status" class="muted">Idle</span>
        </div>
      </section>

      <section class="panel control-grid">
        <h2>Iteration Controls</h2>
        <input id="refine-frontend" placeholder="frontend refinement" />
        <input id="refine-backend" placeholder="backend refinement" />
        <input id="refine-routing" placeholder="routing refinement" />
        <input id="refine-providers" placeholder="providers refinement" />
        <input id="refine-persistence" placeholder="persistence refinement" />
        <input id="refine-ui_ux" placeholder="ui/ux refinement" />
      </section>

      <div id="results" class="control-grid"></div>
    </main>

    <script type="module" src="../src/main.jsx"></script>
  </body>
</html>
