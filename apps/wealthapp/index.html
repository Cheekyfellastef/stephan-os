<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wealth App</title>
    <link rel="stylesheet" href="./styles/wealthapp.css" />
  </head>
  <body>
    <main class="wealth-app">
      <h1>📈 Wealth App Simulation</h1>
      <p>Projection preview running in Stephanos workspace.</p>

      <label for="starting-assets">Starting Assets (£)</label>
      <input id="starting-assets" type="range" min="10000" max="1000000" step="5000" value="120000" />

      <label for="monthly-contribution">Monthly Contribution (£)</label>
      <input id="monthly-contribution" type="range" min="0" max="5000" step="50" value="750" />

      <p id="projection-output"></p>
    </main>

    <script type="module" src="./scripts/wealthapp.js"></script>
  </body>
</html>
